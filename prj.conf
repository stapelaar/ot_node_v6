########################################
# KERNEL
########################################
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_IDLE_STACK_SIZE=1024

########################################
# LOGGING
########################################
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

########################################
# NETWORKING + OPENTHREAD
########################################
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_NET_SOCKETS_PACKET=y
CONFIG_NET_IPV6_NBR_CACHE=y
CONFIG_NET_IPV6_MLD=y
CONFIG_NET_IPV6_FRAGMENT=y
CONFIG_NET_UDP_CHECKSUM=y
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=4
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=8

CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_OPENTHREAD_UPTIME=y
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=9216
CONFIG_NET_L2_OPENTHREAD=y

########################################
# COAP
########################################
CONFIG_COAP=y
CONFIG_POSIX_API=y

########################################
# I2C + SENSORS (drivers enabled per node in nodes/*.conf)
########################################
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_GPIO=y

########################################
# STACK SENTINEL
########################################
CONFIG_STACK_SENTINEL=y
CONFIG_INIT_STACKS=y

########################################
# SETTINGS + FLASH (ZMS backend)
########################################
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS_MAX_COLLISIONS_BITS=4
CONFIG_ZMS_LOOKUP_CACHE=y
CONFIG_ZMS_LOOKUP_CACHE_SIZE=512

########################################
# OPENTHREAD SHELL
########################################
CONFIG_SERIAL=y
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_INTERRUPT_DRIVEN=y
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_UART_CONSOLE=n

########################################
# 1-WIRE
########################################
CONFIG_W1=y
CONFIG_W1_NET=y

CONFIG_W1_ZEPHYR_GPIO_TIME_CRITICAL=y

