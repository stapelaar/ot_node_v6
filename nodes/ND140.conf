###############################################
# Node identity
###############################################
CONFIG_APP_NODE_ID="140"

###############################################
# Measurement cadence
###############################################
CONFIG_APP_MEASUREMENT_PERIOD_S=60

###############################################
# Thread role (FTD - fixed install, mains powered)
###############################################
CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_MTD=n
CONFIG_OPENTHREAD_JOINER=y

###############################################
# Features
###############################################
CONFIG_APP_PUBLISH_UPTIME=y
CONFIG_APP_DEBUG_SENSOR=y

###############################################
# Sensors enabled
###############################################
CONFIG_APP_USE_SHT41_SENSOR=n
CONFIG_APP_USE_SCD41_SENSOR=n
CONFIG_APP_USE_DS18B20_SENSOR=n
CONFIG_APP_USE_MAX31850_SENSOR=n
CONFIG_APP_USE_SEN50_SENSOR=n
CONFIG_APP_USE_DSMR_SENSOR=y

###############################################
# UART interrupt-driven API (required by dsmr.c)
###############################################
CONFIG_UART_INTERRUPT_DRIVEN=y