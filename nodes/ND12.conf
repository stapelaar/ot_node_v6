###############################################
# Node identity
###############################################
CONFIG_APP_NODE_ID="12"

###############################################
# Measurement cadence
###############################################
CONFIG_APP_MEASUREMENT_PERIOD_S=60

###############################################
# Thread role (FTD)
###############################################
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_FTD=n

# Joiner is allowed for commissioning
CONFIG_OPENTHREAD_JOINER=y

###############################################
# Features
###############################################
CONFIG_APP_PUBLISH_UPTIME=y
CONFIG_APP_DEBUG_SENSOR=y

###############################################
# Sensors enabled
###############################################
CONFIG_APP_USE_SHT41_SENSOR=y
CONFIG_APP_USE_SCD41_SENSOR=n

###############################################
# Drivers required by sensors
###############################################
CONFIG_SHT4X=y

# Required for ZMS Settings backend
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_ZMS=y

# This is the missing symbol causing the build error
CONFIG_SETTINGS_ZMS_MAX_COLLISIONS_BITS=4

# Strongly recommended (ZMS lookup cache is used in the failing function)
CONFIG_ZMS_LOOKUP_CACHE=y
CONFIG_ZMS_LOOKUP_CACHE_SIZE=512